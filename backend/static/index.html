// ── BADGE ────────────────────────────────────────────────────────────────────
const Badge = ({type, label}) => {
  const map = {
    open:      {bg:'#dbeafe',color:'#1d4ed8',dot:'#3b82f6'},
    pending:   {bg:'#fef3c7',color:'#92400e',dot:'#f59e0b'},
    escalated: {bg:'#fee2e2',color:'#991b1b',dot:'#ef4444'},
    resolved:  {bg:'#d1fae5',color:'#065f46',dot:'#10b981'},
    critical:  {bg:'#fee2e2',color:'#991b1b',dot:'#ef4444'},
    high:      {bg:'#ffedd5',color:'#9a3412',dot:'#f97316'},
    medium:    {bg:'#fef3c7',color:'#92400e',dot:'#f59e0b'},
    low:       {bg:'#f1f5f9',color:'#475569',dot:'#94a3b8'},
  };
  const s = map[type] || map.low;
  const labels = {open:'Ouvert',pending:'En attente',escalated:'Escaladé',resolved:'Résolu',critical:'Critique',high:'Haute',medium:'Moyenne',low:'Basse'};
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:600,background:s.bg,color:s.color}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:s.dot,animation:type==='escalated'?'pulse-dot 1.5s ease infinite':undefined}}/>
      {label||labels[type]||type}
    </span>
  );
};

// ── CHARTS ───────────────────────────────────────────────────────────────────
const AreaChart = ({data, color, height=80}) => {
  const w=320, h=height, pad=4;
  const max = Math.max(...data.map(d=>d.v));
  const min = Math.min(...data.map(d=>d.v));
  const range = max - min || 1;
  const pts = data.map((d,i)=>({
    x: pad + (i/(data.length-1))*(w-pad*2),
    y: pad + (1-(d.v-min)/range)*(h-pad*2)
  }));
  const line = pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z`;
  const gradId = `grad-${color.replace('#','')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height}} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gradId})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke="#fff" strokeWidth="1.5"/>
      ))}
    </svg>
  );
};

const BarChart = ({data, color, height=100}) => {
  const w=320, h=height, pad=8, gap=6;
  const max = Math.max(...data.map(d=>d.v))||1;
  const bw = (w - pad*2 - gap*(data.length-1)) / data.length;
  return (
    <svg viewBox={`0 0 ${w} ${h+20}`} style={{width:'100%',height:height+20}} preserveAspectRatio="none">
      {data.map((d,i)=>{
        const bh = (d.v/max)*(h-12);
        const x = pad + i*(bw+gap);
        const y = h - bh;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} fillOpacity={d.highlight?1:.45}/>
            <text x={x+bw/2} y={h+14} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="DM Sans">{d.l}</text>
          </g>
        );
      })}
    </svg>
  );
};

const DonutChart = ({segments, size=120}) => {
  const r=42, cx=60, cy=60, stroke=14;
  const circ = 2*Math.PI*r;
  const total = segments.reduce((a,s)=>a+s.v,0)||1;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>
      {segments.map((s,i)=>{
        const dash = (s.v/total)*circ;
        const gap = circ - dash;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${gap}`}
            strokeDashoffset={-offset}
            strokeLinecap="round"
            style={{transition:'stroke-dasharray .6s ease'}}
          />
        );
        offset += dash + 1.5;
        return el;
      })}
      <text x={cx} y={cy-4} textAnchor="middle" fontSize="16" fontWeight="700" fill="#0f172a" fontFamily="DM Sans">{total}</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="DM Sans">tickets</text>
    </svg>
  );
};

// ── TICKET DETAIL PAGE ────────────────────────────────────────────────────────
const TicketDetail = ({ticket, setPage, tweaks}) => {
  const [reply, setReply] = useState('');
  const [takeOver, setTakeOver] = useState(false);
  const [messages, setMessages] = useState(ticket.messages);
  const [sending, setSending] = useState(false);
  const [agentTyping, setAgentTyping] = useState(false);
  const bottomRef = useRef();

  const sendReply = () => {
    if(!reply.trim()) return;
    const newMsg = {role:takeOver?'human':'client',text:reply,ts:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})};
    setMessages(m=>[...m,newMsg]);
    setReply('');
    setSending(true);
    if(!takeOver) {
      setTimeout(()=>{
        setAgentTyping(true);
        setSending(false);
        setTimeout(()=>{
          setAgentTyping(false);
          setMessages(m=>[...m,{role:'agent',ai:true,text:"Merci pour votre message. Je prends en charge votre demande et reviens vers vous dans les plus brefs délais.",ts:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}]);
        },2000);
      },500);
    } else {
      setSending(false);
    }
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <TopBar title={ticket.id} subtitle={`${ticket.client} · ${ticket.marketplace}`} tweaks={tweaks}>
        <button onClick={()=>setPage('tickets')} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',fontSize:12,color:'#64748b',cursor:'pointer',fontFamily:'DM Sans'}}>
          <Icon name="arrowLeft" size={13} color="#64748b"/> Retour
        </button>
      </TopBar>

      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 300px',overflow:'hidden'}}>
        {/* Conversation */}
        <div style={{display:'flex',flexDirection:'column',borderRight:'1px solid #f1f5f9',overflow:'hidden'}}>
          {/* Ticket meta */}
          <div style={{padding:'14px 24px',background:'#fff',borderBottom:'1px solid #f1f5f9',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <Badge type={ticket.status}/>
            <Badge type={ticket.priority}/>
            <span style={{fontSize:11,background:'#f1f5f9',color:'#475569',padding:'3px 8px',borderRadius:6}}>{ticket.category}</span>
            <span style={{fontSize:11,color:'#94a3b8',marginLeft:'auto'}}>Commande: <span style={{fontFamily:'DM Mono',color:'#3b82f6',fontWeight:500}}>{ticket.orderRef}</span></span>
            <span style={{fontSize:11,color:ticket.sla==='Dépassé'?'#ef4444':'#f59e0b',fontWeight:600}}>⏱ SLA: {ticket.sla}</span>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:14,background:'#fafbff'}}>
            {messages.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='client'?'flex-start':'flex-end',animation:'slide-in .2s ease both'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                  {m.role==='client' && <div style={{width:20,height:20,borderRadius:'50%',background:'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#64748b'}}>{ticket.client[0]}</div>}
                  {m.ai && <div style={{width:20,height:20,borderRadius:'50%',background:tweaks.agentColor+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:tweaks.agentColor,border:`1px solid ${tweaks.agentColor}40`}}>IA</div>}
                  {m.role==='human' && !m.ai && <div style={{width:20,height:20,borderRadius:'50%',background:'#dbeafe',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#3b82f6'}}>M</div>}
                  <span style={{fontSize:11,color:'#94a3b8'}}>{m.role==='client'?ticket.client:m.ai?tweaks.agentName:'Marie (humain)'} · {m.ts}</span>
                </div>
                <div style={{
                  maxWidth:'80%',padding:'10px 14px',borderRadius:m.role==='client'?'4px 12px 12px 12px':'12px 4px 12px 12px',
                  fontSize:13,lineHeight:1.6,color:m.role==='client'?'#1e293b':'#fff',
                  background:m.role==='client'?'#fff':m.ai?tweaks.agentColor:tweaks.accentColor,
                  boxShadow:'0 1px 3px rgba(0,0,0,.06)',border:m.role==='client'?'1px solid #f1f5f9':'none',
                }}>{m.text}</div>
              </div>
            ))}
            {agentTyping && (
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>

                <Icon name="handoff" size={12} color="#1d4ed8"/> Vous répondez en tant qu'humain — {tweaks.agentName} est en pause sur ce ticket

            <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
              <textarea value={reply} onChange={e=>setReply(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendReply();}}} placeholder={takeOver?"Votre réponse manuelle…":`Simuler un message client…`} style={{flex:1,border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 14px',fontSize:13,fontFamily:'DM Sans',resize:'none',height:60,outline:'none',color:'#334155',background:'#f8fafc'}}/>
              <button onClick={sendReply} style={{width:40,height:40,borderRadius:10,background:tweaks.accentColor,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Icon name="send" size={15} color="#fff"/>
              </button>
            </div>
          </div>
        </div>

        {/* Right panel */}
        <div style={{overflowY:'auto',background:'#fff'}}>
          {/* Take over */}
          <div style={{padding:'16px 20px',borderBottom:'1px solid #f8fafc'}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f172a',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Contrôle</div>

              background:takeOver?'#d1fae5':tweaks.agentColor+'10',color:takeOver?'#065f46':tweaks.agentColor,
              fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'DM Sans',display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s',
            }}>
              {takeOver ? <><Icon name="check" size={14} color="#065f46"/> Reprendre contrôle actif</> : <><Icon name="handoff" size={14} color={tweaks.agentColor}/> Reprendre la main</>}
            </button>

          </div>

          {/* Client info */}
          <div style={{padding:'16px 20px',borderBottom:'1px solid #f8fafc'}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f172a',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Client</div>

              <div key={r.k} style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontSize:11,color:'#94a3b8'}}>{r.k}</span>
                <span style={{fontSize:11,fontWeight:500,color:'#334155',fontFamily:r.k==='Commande'?'DM Mono':undefined,textAlign:'right',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.v}</span>
              </div>
            ))}
          </div>

          {/* Agent reasoning */}
          <div style={{padding:'16px 20px',borderBottom:'1px solid #f8fafc'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:tweaks.agentColor,animation:'pulse-dot 2s ease infinite'}}/>
              <div style={{fontWeight:700,fontSize:12,color:'#0f172a',textTransform:'uppercase',letterSpacing:.5}}>Raisonnement IA</div>
            </div>

          {/* Timeline */}

  const counter = useRef(10);

  const NEW_EVENTS = [
    {type:'in_progress',ticket:'TK-4822',client:'Julie Bernard',action:'Analyse demande échange — produit hors délai retour',detail:"Client demande échange à 45j. Politique: 30j. Agent évalue exception possible."},

  ];

  useEffect(()=>{
    if(paused) return;
    const t = setInterval(()=>{
      const ev = {...NEW_EVENTS[counter.current % NEW_EVENTS.length], id:`ev-${counter.current}`, ts:'à l\'instant'};
      counter.current++;
      setEvents(prev=>[ev,...prev.slice(0,14)]);
    },5000);
    return ()=>clearInterval(t);
  },[paused]);

  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <TopBar title="Flux Live" subtitle="Événements agent IA en temps réel" tweaks={tweaks}>
        <button onClick={()=>setPaused(v=>!v)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:8,border:`1px solid ${paused?'#e2e8f0':tweaks.agentColor+'60'}`,background:paused?'#fff':tweaks.agentColor+'10',color:paused?'#64748b':tweaks.agentColor,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans',transition:'all .2s'}}>

        </button>

            <div key={k} style={{background:'#fff',borderRadius:10,padding:'12px 18px',border:'1px solid #f1f5f9',display:'flex',gap:10,alignItems:'center'}}>

                  <span style={{fontSize:12,color:'#475569'}}>{t.l}</span>
                  <span style={{fontSize:12,fontWeight:700,color:'#0f172a'}}>{t.v} ({mpStats.totalTickets>0?Math.round(t.v/mpStats.totalTickets*100):0}%)</span>
                </div>
                <div style={{height:6,background:'#f1f5f9',borderRadius:99}}>
                  <div style={{width:`${mpStats.totalTickets>0?Math.round(t.v/mpStats.totalTickets*100):0}%`,height:'100%',background:t.c,borderRadius:99,transition:'width .6s ease'}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Performance marchands */}
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #f1f5f9',padding:'18px 20px'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:16,textTransform:'uppercase',letterSpacing:.5}}>Performance par marchand</div>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'#f8fafc'}}>
                {['Marchand','Tickets','IA %','SLA ⚠️','Montant'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:h==='Marchand'?'left':'right',fontSize:10,fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:.5}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {mpMerchants.map(m=>(
                  <tr key={m.name} style={{borderTop:'1px solid #f8fafc'}}>
                    <td style={{padding:'10px',fontSize:13,fontWeight:600,color:'#0f172a'}}>{m.name}</td>
                    <td style={{padding:'10px',fontSize:12,textAlign:'right',color:'#334155'}}>{m.total}</td>
                    <td style={{padding:'10px',fontSize:12,fontWeight:700,textAlign:'right',color:m.rate>=85?'#10b981':m.rate>=70?'#f59e0b':'#ef4444'}}>{m.rate}%</td>
                    <td style={{padding:'10px',fontSize:12,fontWeight:700,textAlign:'right',color:m.slaBreaches>0?'#ef4444':'#10b981'}}>{m.slaBreaches}</td>
                    <td style={{padding:'10px',fontSize:11,textAlign:'right',color:'#64748b',fontFamily:'DM Mono'}}>{m.amount.toLocaleString('fr-FR')}€</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Tickets escaladés — lecture seule */}
        <div style={{background:'#fff',borderRadius:12,border:'1px solid #f1f5f9',overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:'1px solid #f8fafc',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:700,fontSize:14,color:'#0f172a'}}>Tickets nécessitant attention</span>
              {MP_CRITICAL.length>0 && <span style={{background:'#fee2e2',color:'#991b1b',borderRadius:99,fontSize:10,fontWeight:700,padding:'2px 8px'}}>{MP_CRITICAL.length}</span>}
            </div>
            <span style={{fontSize:11,color:'#94a3b8',fontStyle:'italic'}}>Lecture seule — aucune action disponible</span>
          </div>
          {MP_CRITICAL.length===0 ? (
            <div style={{padding:40,textAlign:'center',color:'#10b981',fontSize:13,fontWeight:600}}>✅ Aucun ticket escaladé pour le moment</div>
          ) : (
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'#f8fafc'}}>
                {['Client (anonymisé)','Marketplace','Sujet','Statut','Priorité','SLA'].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:10,fontWeight:600,color:'#94a3b8',letterSpacing:.5,textTransform:'uppercase'}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {MP_CRITICAL.map(t=>(
                  <tr key={t.id} style={{borderTop:'1px solid #f8fafc'}}>
                    <td style={{padding:'12px 16px'}}>
                      <div style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>{t.client.split(' ')[0]} {t.client.split(' ').slice(-1)[0][0]}.</div>
                      <div style={{fontSize:10,color:'#94a3b8',fontFamily:'DM Mono'}}>#{t.orderRef}</div>
                    </td>
                    <td style={{padding:'12px 16px',fontSize:12,color:'#64748b'}}>{t.marketplace}</td>
                    <td style={{padding:'12px 16px',fontSize:12,color:'#334155',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.subject}</td>
                    <td style={{padding:'12px 16px'}}><Badge type={t.status}/></td>
                    <td style={{padding:'12px 16px'}}><Badge type={t.priority}/></td>
                    <td style={{padding:'12px 16px',fontSize:11,color:t.sla==='Dépassé'?'#ef4444':'#f59e0b',fontWeight:600}}>{t.sla}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

      </div>
    </div>
  );
};

// ── DEMO PAGE ─────────────────────────────────────────────────────────────────
const DemoPage = ({setPage, tweaks}) => {
  const [scenarios, setScenarios] = useState([]);
  const [tickets, setTickets] = useState([]);
  const [loading, setLoading] = useState(null);
  const [simulating, setSimulating] = useState(new Set());
  const [resetting, setResetting] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3200); };

  const loadTickets = () => fetch('/tickets').then(r=>r.json()).then(setTickets).catch(()=>{});

  useEffect(() => {
    fetch('/demo/scenarios').then(r=>r.json()).then(setScenarios).catch(()=>{});
    loadTickets();
    const id = setInterval(loadTickets, 3000);
    return () => clearInterval(id);
  }, []);

  const handleLoad = async (sid) => {
    setLoading(sid);
    try {
      const r = await fetch(`/demo/load-scenario/${sid}`, {method:'POST'});
      const d = await r.json();
      showToast(`Scénario ${sid.toUpperCase()} chargé — ${d.tickets_created.length} tickets créés`);
      await loadTickets();
    } catch { showToast('Erreur lors du chargement', false); }
    finally { setLoading(null); }
  };

  const handleSimulate = async (ticketId) => {
    setSimulating(s => { const n=new Set(s); n.add(ticketId); return n; });
    try {
      await fetch(`/demo/simulate-flow/${ticketId}?delay_ms=600`, {method:'POST'});
      showToast('Flow simulé — validation créée');
    } catch { showToast('Erreur simulation', false); }
    finally {
      setSimulating(s => { const n=new Set(s); n.delete(ticketId); return n; });
      await loadTickets();
    }
  };

  const handleReset = async () => {
    setResetting(true);
    try {
      await fetch('/demo/reset', {method:'POST'});
      setTickets([]);
      showToast('Base réinitialisée');
    } catch { showToast('Erreur reset', false); }
    finally { setResetting(false); }
  };

  const icons = {A:'🟢',B:'🔵',C:'🔴'};
  const statusColor = {pending:'#94a3b8',in_progress:'#3b82f6',awaiting_human:'#f59e0b',resolved:'#10b981',escalated:'#ef4444'};
  const statusLabel = {pending:'En attente',in_progress:'En cours',awaiting_human:'Validation requise',resolved:'Résolu',escalated:'Escaladé'};

  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <TopBar title="Panneau Démo" subtitle="Charge un scénario · Simule les agents · Valide les remboursements" tweaks={tweaks}>
        <button onClick={handleReset} disabled={resetting} style={{padding:'6px 14px',borderRadius:8,border:'1.5px solid #fee2e2',background:'#fff',color:'#ef4444',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans',opacity:resetting?0.5:1}}>
          {resetting?'Reset…':'🗑 Réinitialiser'}
        </button>
      </TopBar>
      {toast && (
        <div style={{position:'fixed',bottom:24,right:24,zIndex:999,background:toast.ok?'#064e3b':'#7f1d1d',color:'#fff',padding:'12px 20px',borderRadius:12,fontSize:13,fontWeight:600,boxShadow:'0 8px 24px rgba(0,0,0,.2)',animation:'slide-in .2s ease'}}>
          {toast.msg}
        </div>
      )}
      <div style={{padding:28}}>

        {/* Étape 1 */}
        <div style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:14}}>Étape 1 · Choisir un scénario</div>
          {scenarios.length===0 ? (
            <div style={{fontSize:13,color:'#94a3b8',fontStyle:'italic'}}>Chargement des scénarios…</div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
              {scenarios.map(s=>(
                <div key={s.id} style={{background:'#fff',borderRadius:12,border:'1px solid #f1f5f9',padding:'18px 20px',display:'flex',flexDirection:'column',gap:14,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
                  <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                    <span style={{fontSize:22,lineHeight:1}}>{icons[s.id.toUpperCase()]||'⚪'}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:'#0f172a'}}>{s.name}</div>
                      <div style={{fontSize:11,color:'#94a3b8',marginTop:3,lineHeight:1.4}}>{s.description}</div>
                    </div>
                  </div>
                  <button onClick={()=>handleLoad(s.id)} disabled={!!loading} style={{padding:'9px',borderRadius:8,background:'#0f172a',border:'none',color:'#fff',fontSize:12,fontWeight:700,cursor:loading?'not-allowed':'pointer',fontFamily:'DM Sans',opacity:loading?0.6:1,transition:'opacity .15s'}}>
                    {loading===s.id?'Chargement…':`Charger scénario ${s.id.toUpperCase()}`}
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Étape 2 */}
        <div style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:14}}>
            Étape 2 · Simuler les agents ({tickets.length} ticket{tickets.length!==1?'s':''})
          </div>
          {tickets.length===0 ? (
            <div style={{background:'#fff',borderRadius:12,border:'2px dashed #e2e8f0',padding:40,textAlign:'center',color:'#94a3b8',fontSize:13}}>
              Aucun ticket — charge un scénario ci-dessus pour commencer
            </div>
          ) : (
            <div style={{background:'#fff',borderRadius:12,border:'1px solid #f1f5f9',overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
              {tickets.map((t,i)=>{
                const sc = statusColor[t.status]||'#94a3b8';
                const sl = statusLabel[t.status]||t.status;
                const isSim = simulating.has(t.id);
                return (
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 20px',borderTop:i>0?'1px solid #f8fafc':'none'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>{t.customer?.name}</span>
                        {t.customer?.is_vip && <span style={{fontSize:9,fontWeight:700,color:'#d97706',background:'#fef3c7',padding:'1px 6px',borderRadius:99}}>VIP</span>}
                        <span style={{fontSize:11,color:'#94a3b8',fontFamily:'monospace'}}>#{t.order?.id}</span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                        <span style={{fontSize:11,background:'#f1f5f9',color:'#475569',padding:'2px 8px',borderRadius:6}}>{t.type}</span>
                        <span style={{fontSize:11,color:'#64748b'}}>{t.order?.total_amount?.toLocaleString('fr-FR',{style:'currency',currency:'EUR'})}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,background:sc+'18',color:sc}}>
                        <span style={{width:6,height:6,borderRadius:'50%',background:sc,display:'inline-block'}}/>
                        {sl}
                      </span>
                      {t.status==='pending' && (
                        <button onClick={()=>handleSimulate(t.id)} disabled={isSim} style={{padding:'7px 14px',borderRadius:8,background:'#3b82f6',border:'none',color:'#fff',fontSize:11,fontWeight:700,cursor:isSim?'not-allowed':'pointer',fontFamily:'DM Sans',opacity:isSim?0.6:1,whiteSpace:'nowrap'}}>
                          {isSim?'Simulation…':'▶ Simuler flow'}
                        </button>
                      )}
                      {t.status==='awaiting_human' && (
                        <button onClick={()=>setPage('validations')} style={{padding:'7px 14px',borderRadius:8,background:'#f59e0b',border:'none',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans',whiteSpace:'nowrap'}}>
                          Approuver →
                        </button>
                      )}
                      {t.status==='in_progress' && (
                        <span style={{fontSize:11,color:'#3b82f6',fontWeight:600}}>en cours…</span>
                      )}
                      {t.status==='resolved' && (
                        <span style={{fontSize:11,color:'#10b981',fontWeight:700}}>✓ Résolu</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Étape 3 — conditionnelle */}
        {tickets.some(t=>t.status==='awaiting_human') && (
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:1,textTransform:'uppercase',marginBottom:14}}>Étape 3 · Approuver les remboursements</div>
            <button onClick={()=>setPage('validations')} style={{padding:'12px 24px',borderRadius:10,background:'#f59e0b',border:'none',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans',boxShadow:'0 4px 12px rgba(245,158,11,.3)'}}>
              Aller aux validations →
            </button>
          </div>
        )}

      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('mirakl-sav-state')||'{}') } catch{return{}} })();
  const [page, setPage] = useState(saved.page||'home');
  const [selectedTicket, setSelectedTicket] = useState(null);
  const [tweaks, setTweaks] = useState({...TWEAK_DEFAULTS,...(saved.tweaks||{})});
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(()=>{ localStorage.setItem('mirakl-sav-state',JSON.stringify({page,tweaks})); },[page,tweaks]);

  useEffect(()=>{
    window.addEventListener('message', e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const navigateToTicket = (t) => { setSelectedTicket(t); setPage('ticket-detail'); };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f1f5f9'}}>
      <Sidebar page={page} setPage={setPage} tweaks={tweaks}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {page==='home' && <HomePage setPage={setPage} setSelectedTicket={navigateToTicket} tweaks={tweaks}/>}
        {page==='tickets' && <TicketsPage setPage={setPage} setSelectedTicket={navigateToTicket} tweaks={tweaks}/>}
        {page==='ticket-detail' && selectedTicket && <TicketDetail ticket={selectedTicket} setPage={setPage} tweaks={tweaks}/>}
        {page==='flux' && <FluxPage setPage={setPage} tweaks={tweaks}/>}
        {page==='validations' && <ValidationsPage tweaks={tweaks}/>}
        {page==='agent' && <AgentPage tweaks={tweaks}/>}
        {page==='demo' && <DemoPage setPage={setPage} tweaks={tweaks}/>}
        {page==='marketplace' && <MarketplacePage tweaks={tweaks}/>}
        {page==='settings' && <PlaceholderPage title="Paramètres" tweaks={tweaks}/>}
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
