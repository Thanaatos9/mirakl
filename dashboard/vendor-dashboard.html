const Badge = ({type, label}) => {
  const map = {
    open:      {bg:'#EEF3FF',color:'#3b82f6',dot:'#3b82f6'},
    pending:   {bg:'#fef3c7',color:'#92400e',dot:'#f59e0b'},
    escalated: {bg:'#fee2e2',color:'#991b1b',dot:'#ef4444'},
    resolved:  {bg:'#d1fae5',color:'#065f46',dot:'#10b981'},
    critical:  {bg:'#fee2e2',color:'#991b1b',dot:'#ef4444'},
    high:      {bg:'#ffedd5',color:'#9a3412',dot:'#f97316'},
    medium:    {bg:'#f1f5f9',color:'#0f172a',dot:'#3b82f6'},
    low:       {bg:'#f1f5f9',color:'rgba(15,23,42,0.5)',dot:'rgba(15,23,42,0.3)'},
  };
  const s = map[type] || map.low;
  const labels = {open:'Ouvert',pending:'En attente',escalated:'Escaladé',resolved:'Résolu',critical:'Critique',high:'Haute',medium:'Moyenne',low:'Basse'};
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:600,background:s.bg,color:s.color}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:s.dot,animation:type==='escalated'?'pulse-dot 1.5s ease infinite':undefined}}/>
      {label||labels[type]||type}
    </span>
  );
};

// ── CHARTS ───────────────────────────────────────────────────────────────────
const AreaChart = ({data, color, height=80}) => {
  const w=320, h=height, pad=4;
  const max = Math.max(...data.map(d=>d.v));
  const min = Math.min(...data.map(d=>d.v));
  const range = max - min || 1;
  const pts = data.map((d,i)=>({
    x: pad + (i/(data.length-1))*(w-pad*2),
    y: pad + (1-(d.v-min)/range)*(h-pad*2)
  }));
  const line = pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z`;
  const gradId = `grad-${color.replace('#','')}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height}} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gradId})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke="#fff" strokeWidth="1.5"/>
      ))}
    </svg>
  );
};

const BarChart = ({data, color, height=100}) => {
  const w=320, h=height, pad=8, gap=6;
  const max = Math.max(...data.map(d=>d.v))||1;
  const bw = (w - pad*2 - gap*(data.length-1)) / data.length;
  return (
    <svg viewBox={`0 0 ${w} ${h+20}`} style={{width:'100%',height:height+20}} preserveAspectRatio="none">
      {data.map((d,i)=>{
        const bh = (d.v/max)*(h-12);
        const x = pad + i*(bw+gap);
        const y = h - bh;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx="4" fill={color} fillOpacity={d.highlight?1:.45}/>
            <text x={x+bw/2} y={h+14} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="DM Sans">{d.l}</text>
          </g>
        );
      })}
    </svg>
  );
};

const DonutChart = ({segments, size=120}) => {
  const r=42, cx=60, cy=60, stroke=14;
  const circ = 2*Math.PI*r;
  const total = segments.reduce((a,s)=>a+s.v,0)||1;
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>
      {segments.map((s,i)=>{
        const dash = (s.v/total)*circ;
        const gap = circ - dash;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${gap}`}
            strokeDashoffset={-offset}
            strokeLinecap="round"
            style={{transition:'stroke-dasharray .6s ease'}}
          />
        );
        offset += dash + 1.5;
        return el;
      })}
      <text x={cx} y={cy-4} textAnchor="middle" fontSize="16" fontWeight="700" fill="#0f172a" fontFamily="DM Sans">{total}</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize="9" fill="#94a3b8" fontFamily="DM Sans">tickets</text>
    </svg>
  );
};

    const q = search.toLowerCase();
    const matchQ = !q || t.client.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) || t.subject.toLowerCase().includes(q);
    const matchS = filterStatus==='all' || t.status===filterStatus;
    const matchP = filterPriority==='all' || t.priority===filterPriority;
    return matchQ && matchS && matchP;
  });
  return (
    <div style={{flex:1,overflowY:'auto'}}>

          </div>
          {[{label:'Statut',val:filterStatus,set:setFilterStatus,opts:[{v:'all',l:'Tous statuts'},{v:'open',l:'Ouverts'},{v:'pending',l:'En attente'},{v:'escalated',l:'Escaladés'},{v:'resolved',l:'Résolus'}]},

// ── TICKET DETAIL PAGE ────────────────────────────────────────────────────────
const TicketDetail = ({ticket, setPage, tweaks, filters}) => {
  const [reply, setReply] = useState('');
  const [takeOver, setTakeOver] = useState(false);
  const [messages, setMessages] = useState(ticket.messages);
  const [sending, setSending] = useState(false);
  const [agentTyping, setAgentTyping] = useState(false);
  const bottomRef = useRef();

  const sendReply = () => {
    if(!reply.trim()) return;
    const newMsg = {role:takeOver?'human':'client',text:reply,ts:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})};
    setMessages(m=>[...m,newMsg]);
    setReply('');
    setSending(true);
    if(!takeOver) {
      setTimeout(()=>{
        setAgentTyping(true);
        setSending(false);
        setTimeout(()=>{
          setAgentTyping(false);
          setMessages(m=>[...m,{role:'agent',ai:true,text:"Merci pour votre message. Je prends en charge votre demande et reviens vers vous dans les plus brefs délais.",ts:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}]);
        },2000);
      },500);
    } else {
      setSending(false);
    }
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <TopBar title={ticket.id} subtitle={`${ticket.client} · ${ticket.marketplace}`} tweaks={tweaks} filters={filters}>
        <button onClick={()=>setPage('tickets')} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',fontSize:12,color:'#334155',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>
          <Icon name="arrowLeft" size={13} color="#64748b"/> Retour
        </button>
      </TopBar>

      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 300px',overflow:'hidden'}}>
        {/* Conversation */}
        <div style={{display:'flex',flexDirection:'column',borderRight:'1px solid #f1f5f9',overflow:'hidden'}}>
          {/* Ticket meta */}
          <div style={{padding:'14px 24px',background:'#fff',borderBottom:'1px solid #f1f5f9',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <Badge type={ticket.status}/>
            <Badge type={ticket.priority}/>
            <span style={{fontSize:11,background:'#f1f5f9',color:'#334155',padding:'3px 8px',borderRadius:6}}>{ticket.category}</span>
            <span style={{fontSize:11,color:'rgba(15,23,42,0.4)',marginLeft:'auto'}}>Commande: <span style={{fontFamily:"'DM Sans',sans-serif",color:'#3b82f6',fontWeight:500}}>{ticket.orderRef}</span></span>
            <span style={{fontSize:11,color:ticket.sla==='Dépassé'?'#8b5cf6':'#f59e0b',fontWeight:600}}>⏱ SLA: {ticket.sla}</span>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:14,background:'#f1f5f9'}}>
            {messages.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='client'?'flex-start':'flex-end',animation:'slide-in .2s ease both'}}>

  useEffect(()=>{
    if(paused) return;
    const t = setInterval(()=>{
      const ev = {...NEW_EVENTS[counter.current % NEW_EVENTS.length], id:`ev-${counter.current}`, ts:'à l\'instant'};

      setEvents(prev=>[ev,...prev.slice(0,14)]);

    return ()=>clearInterval(t);

  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <TopBar title="Flux Live" subtitle="Événements agent IA en temps réel" tweaks={tweaks}>

            <div key={k} style={{background:'#fff',borderRadius:10,padding:'12px 18px',border:'1px solid #f1f5f9',display:'flex',gap:10,alignItems:'center'}}>

              <span style={{fontSize:12,fontWeight:600,color:'#334155'}}>{v.label}</span>

  );
};

                    <td style={{padding:'12px 16px',textAlign:'center'}}>
                      <span style={{padding:'3px 10px',borderRadius:99,fontSize:11,fontWeight:600,background:statusColor[overallStatus]+'18',color:statusColor[overallStatus]}}>

                    <td style={{padding:'12px 16px',textAlign:'center'}}>
                      {overallStatus!=='ok' && (

          </table>
        </div>
      </div>
    </div>
  );
};

const TweaksPanel = ({tweaks, setTweaks, visible}) => {
  if(!visible) return null;
  const update = (k,v) => {
    const next = {...tweaks,[k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };
  return (
    <div style={{position:'fixed',bottom:20,right:20,width:260,background:'#fff',borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,.16)',border:'1px solid #e2e8f0',zIndex:1000,padding:16,animation:'slide-in .2s ease'}}>

      {[{k:'accentColor',l:'Couleur principale',type:'color'},{k:'agentColor',l:'Couleur agent IA',type:'color'},{k:'companyName',l:'Nom boutique',type:'text'},{k:'agentName',l:"Nom de l'agent",type:'text'}].map(f=>(
        <div key={f.k} style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'#334155',fontWeight:500,marginBottom:4}}>{f.l}</div>
          {f.type==='color'?
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="color" value={tweaks[f.k]} onChange={e=>update(f.k,e.target.value)} style={{width:32,height:28,border:'none',borderRadius:6,cursor:'pointer',padding:2}}/>
              <span style={{fontSize:11,fontFamily:"'DM Sans',sans-serif",color:'rgba(15,23,42,0.4)'}}>{tweaks[f.k]}</span>
            </div> :
            <input type="text" value={tweaks[f.k]} onChange={e=>update(f.k,e.target.value)} style={{width:'100%',padding:'6px 10px',border:'1px solid #e2e8f0',borderRadius:7,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:'none',color:'#334155'}}/>

      ))}
    </div>
  );
};

// ValidationsInner — contenu de ValidationsPage sans TopBar
const ValidationsInner = ({tweaks, validations: vProp}) => {
  const [items, setItems] = useState(vProp || VALIDATIONS_DATA);
  useEffect(() => { if (vProp !== undefined) setItems(vProp); }, [vProp]);
  const [rejectTarget, setRejectTarget] = useState(null);
  const [resolved, setResolved] = useState([]);
  const approve=(id)=>{setItems(v=>v.filter(i=>i.id!==id));setResolved(r=>[...r,{id,action:'approved'}]);};
  const confirmReject=(id,reason)=>{setItems(v=>v.filter(i=>i.id!==id));setResolved(r=>[...r,{id,action:'rejected',reason}]);setRejectTarget(null);};
  return (
    <div style={{padding:24}}>
      {items.length>0?(
        <>
          <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center'}}>
            <div style={{padding:'8px 14px',background:'#f5f3ff',borderRadius:6,fontSize:12,fontWeight:600,color:'#5b21b6',display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:'#8b5cf6',animation:'pulse-dot 1.5s ease infinite',display:'inline-block'}}/>
              {items.length} décision{items.length!==1?'s':''} en attente · {items.reduce((a,i)=>a+i.amount,0)}€ à valider
            </div>
            {resolved.length>0&&<div style={{fontSize:11,color:'rgba(15,23,42,0.4)'}}>{resolved.length} traitée{resolved.length>1?'s':''} ce matin</div>}
          </div>
          {items.map(val=><ValidationCard key={val.id} val={val} tweaks={tweaks} onApprove={approve} onReject={setRejectTarget}/>)}
        </>
      ):(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,gap:12}}>
          <div style={{fontSize:48}}>🎉</div>
          <div style={{fontSize:16,fontWeight:700,color:'#065f46'}}>File vide !</div>
          <div style={{fontSize:13,color:'rgba(15,23,42,0.4)'}}>Toutes les validations ont été traitées.</div>
        </div>
      )}
      {rejectTarget&&<RejectModal val={rejectTarget} onClose={()=>setRejectTarget(null)} onConfirm={confirmReject} tweaks={tweaks}/>}
    </div>
  );
};

const App = () => {
  const isAuthenticated = (() => { try { return localStorage.getItem('mirakl_sav_authenticated') === 'true'; } catch { return false; } })();
  if (!isAuthenticated) {
    window.location.href = 'login.html';
    return null;
  }
  const saved = (() => { try { return JSON.parse(localStorage.getItem('mirakl-sav-state')||'{}') } catch{return{}} })();
  const validPages = ['sav','ia','performance','stock','pricing','settings'];
  const [page, setPage] = useState(validPages.includes(saved.page) ? saved.page : 'sav');
  const [selectedTicket, setSelectedTicket] = useState(null);
  const [tweaks, setTweaks] = useState({...TWEAK_DEFAULTS,...(saved.tweaks||{})});
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [selectedMp, setSelectedMp] = useState('all');
  const [selectedCountry, setSelectedCountry] = useState('FR');
  const filters = {mp:selectedMp, setMp:setSelectedMp, country:selectedCountry, setCountry:setSelectedCountry};

  useEffect(()=>{ localStorage.setItem('mirakl-sav-state',JSON.stringify({page,tweaks})); },[page,tweaks]);

  const [supaData, setSupaData] = useState({version:0});
  useEffect(()=>{
    // Charge tickets depuis Supabase
    sbGet('/tickets?select=*&order=created_at.desc&limit=50').then(d=>{
      if(d.length>0){TICKETS=d.map(fmtTicket);setSupaData(s=>({...s,version:s.version+1}));}
    });
    // Charge validations en attente
    sbGet('/validations?select=*&status=eq.pending&order=created_at.desc').then(d=>{
      VALIDATIONS_DATA=d.map(fmtValidation);
      setSupaData(s=>({...s,validations:d.map(fmtValidation),version:s.version+1}));
    });
    // Charge historique remboursements (tous statuts)
    sbGet('/validations?select=*&order=created_at.desc&limit=30').then(d=>{
      if(d.length>0){REFUNDS_DATA=d.map(fmtValidation);setSupaData(s=>({...s,version:s.version+1}));}
    });
    // Realtime — nouveaux tickets et validations en live
    if(sbClient){
      sbClient.channel('dashboard-live')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'tickets'},p=>{
          TICKETS=[fmtTicket(p.new),...TICKETS];
          setSupaData(s=>({...s,version:s.version+1}));
        })
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'tickets'},p=>{
          TICKETS=TICKETS.map(t=>t.id===p.new.id?fmtTicket(p.new):t);
          setSupaData(s=>({...s,version:s.version+1}));
        })
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'validations'},p=>{
          const nv=[fmtValidation(p.new),...VALIDATIONS_DATA];
          VALIDATIONS_DATA=nv;
          setSupaData(s=>({...s,validations:nv,version:s.version+1}));
        })
        .subscribe();
    }
  },[]);
  useEffect(()=>{
    window.addEventListener('message', e=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const navigateToTicket = (t) => { setSelectedTicket(t); setPage('ticket-detail'); };
  const urgentCount = TICKETS.filter(t=>t.status==='escalated'||t.priority==='critical').length;
  const validationCount = VALIDATIONS_DATA.length;
  const stockAlerts = STOCK_DATA.filter(s=>s.status!=='ok').length;

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f1f5f9'}}>
      <Sidebar page={page} setPage={setPage} tweaks={tweaks} urgentCount={urgentCount} validationCount={validationCount} stockAlerts={stockAlerts}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {page==='sav' && <SavPage setPage={setPage} setSelectedTicket={navigateToTicket} tweaks={tweaks} filters={filters}/>}
        {page==='ticket-detail' && selectedTicket && <TicketDetail ticket={selectedTicket} setPage={page=>{ if(page==='tickets') setPage('sav'); else setPage(page); }} tweaks={tweaks} filters={filters}/>}
        {page==='ia' && <IaPage setPage={setPage} tweaks={tweaks} filters={filters} validations={supaData.validations}/>}
        {page==='performance' && <PerformancePage tweaks={tweaks} filters={filters}/>}
        {page==='stock' && <StockPage tweaks={tweaks} filters={filters}/>}
        {page==='pricing' && <PricingPage tweaks={tweaks} filters={filters}/>}
        {page==='settings' && <PlaceholderPage title="Paramètres" tweaks={tweaks} filters={filters}/>}
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
